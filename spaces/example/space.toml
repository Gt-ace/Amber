# space.toml — per-space configuration.
#
# The only field the loader reads here is `theme`, which selects the
# active theme by name from this space's `themes/` directory. This
# example space ships two themes under `themes/`: `amber-default` and
# `amber-editorial`. If the named theme isn't present, Amber falls
# through to `amber-default`, then to its built-in floor.
#
# Switch themes from the admin theme picker (Spaces -> this space ->
# Theme), or by editing the line below to `amber-editorial`.

theme = "amber-default"
# theme = "amber-editorial"
