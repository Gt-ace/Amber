<header class="site-head">
	<div class="wrap site-head__in">
		<a class="wm" href="/" aria-label="Amber, home">
			<img class="gem gem--wm" src="/icon-192.png" alt="" width="192" height="192" />
			<span class="wm__txt">amber</span>
		</a>
		<div class="site-head__end">
			{{#has_nav}}
			<nav class="nav" aria-label="Primary">
				{{#nav}}<a class="nav__txt" href="{{href}}">{{label}}</a>{{/nav}}
			</nav>
			{{/has_nav}}
			<button class="theme-toggle" type="button" hidden aria-label="Switch theme">
				<svg class="ic ic-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
				<svg class="ic ic-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
			</button>
		</div>
	</div>
</header>
<!--amber:content-->
<footer class="site-foot">
	<div class="wrap">
		<div class="site-foot__top">
			<div>
				<a class="wm" href="/" aria-label="Amber, home">
					<img class="gem gem--wm" src="/icon-192.png" alt="" width="192" height="192" />
					<span class="wm__txt">amber</span>
				</a>
				<p class="foot-tag">Rendered by Amber from a markdown file.</p>
			</div>
			<nav class="foot-links" aria-label="Footer">
				<a href="https://github.com/Gt-ace/Amber">GitHub</a>
				<a href="https://github.com/Gt-ace/Amber/tree/main/docs">Docs</a>
				<a href="https://github.com/Gt-ace/Amber/blob/main/docs/self-hosting.md">Self-hosting guide</a>
				<a href="https://github.com/Gt-ace/Amber/blob/main/LICENSE">License (AGPL-3.0)</a>
			</nav>
		</div>
	</div>
</footer>
