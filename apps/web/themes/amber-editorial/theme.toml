name = "amber-editorial"
version = "0.1.0"
author = "Amber"
description = "An editorial-zine theme: cool greys, a cobalt accent, neo-grotesque headlines, a humanist-sans reading face, a sticky masthead rail."

# theme-color meta. Mirrors --amber-bg light/dark from theme.css — declared
# once here instead of duplicated in route code (the layout renders these).
[theme_color]
light = "#f4f4f2"
dark = "#0d0e11"

# The chrome's footer slot: a single labelled link, rendered after the site
# title in <footer class="site-footer">.
[footer]
label = "Source"
href = "https://github.com/Gt-ace/Amber"
