amber_version = "0.1"

[site]
title = "Mira Halden"
description = "Illustrator and quiet-software person, working out of Lisbon."
url = "https://mirahalden.example"
author = "Mira Halden"
language = "en"

# Nav order is intentionally non-alphabetical: `projects` appears before
# `hello` (p > h) — proves the manifest wins over filesystem ordering.

[[nav]]
kind = "page"
path = "about.md"
label = "About"

[[nav]]
kind = "page"
path = "projects/index.md"
label = "Projects"

[[nav]]
kind = "page"
path = "hello.md"
label = "Say hi"

# `kind` omitted: presence of `path` infers kind = "page".
[[nav]]
path = "notes/2025-09-on-tea.md"
label = "On tea"

[[nav]]
kind = "page"
path = "talks.md"
label = "Talks"
# `talks.md` does not exist on disk → manifest_nav_missing_target warning.

[[nav]]
kind = "page"
path = "_drafts/scratch.md"
label = "Scratch"
# Reference into reserved space → reserved_name_in_content warning.
# The target file exists; the warning is about the *reference*, not a
# missing file. Reserved-prefix paths are silently skipped by content
# discovery, but emit a warning when the manifest references them.

# `kind` omitted: presence of `url` infers kind = "external".
[[nav]]
url = "https://merveilles.town/@mira"
label = "Mastodon"

[redirects]
"/old-portfolio" = "/projects"
"/blog" = "/notes"
