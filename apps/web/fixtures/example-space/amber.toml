amber_version = "0.1"

[site]
title = "Mira Halden"
description = "Illustrator and quiet-software person, working out of Lisbon."
url = "https://mirahalden.example"
author = "Mira Halden"
language = "en"

# Nav is a flat list of {label, href}. `href` is opaque to the loader —
# internal paths and external URLs both pass through unchanged. Order is
# whatever the author writes; the loader doesn't sort.

[[nav]]
label = "About"
href = "/about"

[[nav]]
label = "Projects"
href = "/projects"

[[nav]]
label = "On tea"
href = "/notes/2025-09-on-tea"

[[nav]]
label = "Mastodon"
href = "https://merveilles.town/@mira"

# Forward-compat: extra keys on a nav entry are ignored.
[[nav]]
label = "Say hi"
href = "/say-hi"
note = "extra keys are ignored"

# Malformed entry: missing `href`. Loader skips it with a structured log
# line and continues with the rest of the table.
[[nav]]
label = "Talks"

[redirects]
"/old-portfolio" = "/projects"
"/blog" = "/notes"
