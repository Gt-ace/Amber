services:
  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      AMBER_SPACE_PATH: /space
      NODE_ENV: production
      PORT: "3000"
      HOST: 0.0.0.0
      # Required. Operator-supplied via the deploy's `.env`. Boot fails if
      # this is empty.
      AMBER_AUTH_SECRET: ${AMBER_AUTH_SECRET}
      # Optional. Both must be set to enable Google sign-in.
      AMBER_GOOGLE_CLIENT_ID: ${AMBER_GOOGLE_CLIENT_ID:-}
      AMBER_GOOGLE_CLIENT_SECRET: ${AMBER_GOOGLE_CLIENT_SECRET:-}
      # Required. Used as the OAuth callback base, origin-trust value, and
      # sitemap base. No `:-` default: compose substitution fails fast when
      # this is unset, instead of forwarding an empty string into the
      # container where adapter-node parses it as `new URL('')` and the web
      # container crash-loops with a stack trace that never names the var.
      AMBER_PUBLIC_URL: ${AMBER_PUBLIC_URL:?AMBER_PUBLIC_URL must be set in .env (e.g. https://your-domain.example).}
      # SvelteKit's adapter-node uses ORIGIN to set the request URL's
      # protocol+host. Keep it in sync with AMBER_PUBLIC_URL so better-auth's
      # origin check against the request matches the public URL.
      ORIGIN: ${AMBER_PUBLIC_URL:?AMBER_PUBLIC_URL must be set in .env (e.g. https://your-domain.example).}
    volumes:
      - ./spaces/avp-software:/space
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      start_period: 10s

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
