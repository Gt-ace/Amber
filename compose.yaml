# Desktop-developer install. `docker compose up` from the repo root boots
# Amber against the bundled example space and serves it at
# http://localhost:3000. Editing `spaces/example/*.md` on the host triggers
# the in-container watcher; the next browser refresh shows the change.
#
# This is intentionally the simplest install path — no Caddy, no TLS, no
# healthcheck. Production lives in `compose.prod.yaml` (deployed by
# `./bin/deploy`); the two are separate by design.

services:
  amber:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    environment:
      AMBER_SPACE_PATH: /space
      # AMBER_AUTH_SECRET signs the admin session cookie. The placeholder
      # below is fine for local dev; rotate it with a real random secret
      # (e.g. `openssl rand -hex 32`) before exposing this Amber to anyone.
      AMBER_AUTH_SECRET: "dev-only-replace-me-with-openssl-rand-hex-32"
      # Required: OAuth callback base, origin-trust value, sitemap base.
      # Localhost is fine for desktop dev; production sets the real domain
      # via `.env` (see compose.prod.yaml).
      AMBER_PUBLIC_URL: "http://localhost:3000"
      # Optional: set both to enable Google sign-in / linking.
      # AMBER_GOOGLE_CLIENT_ID: ""
      # AMBER_GOOGLE_CLIENT_SECRET: ""
    volumes:
      - ./spaces/example:/space
    restart: unless-stopped
