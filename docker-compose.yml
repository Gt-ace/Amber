services:
  web:
    build:
      context: ./apps/web
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      AMBER_SPACE_PATH: /space
      NODE_ENV: production
      PORT: "3000"
      HOST: 0.0.0.0
    volumes:
      - ./spaces/avp-software:/space
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      start_period: 10s

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
